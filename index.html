<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso Planner ✨</title>
    
    <!-- TAGS PARA O APP DE CELULAR (PWA) -->
    <meta name="theme-color" content="#8b5cf6"> <!-- Cor Violeta para o topo do celular -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="img/Logo_Planner.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0fdfa; /* teal-50 */
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; scroll-behavior: smooth; }
        
        /* Animações suaves */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>

    <!-- Import Maps: React e Firebase -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        // Habilitando cache local (offline)
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, onSnapshot, addDoc, doc, deleteDoc, updateDoc, setDoc } from 'firebase/firestore';

        // SUAS CHAVES DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAL68BBI5QQwi5y2X8SRYiTjK0i8qn8EwE",
            authDomain: "nosso-planner.firebaseapp.com",
            projectId: "nosso-planner",
            storageBucket: "nosso-planner.firebasestorage.app",
            messagingSenderId: "480834877035",
            appId: "1:480834877035:web:618f65d637b430bb20232e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // Habilita persistência offline
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
        });

        // ==========================================
        // ÍCONES E UTILITÁRIOS
        // ==========================================
        const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconHeart = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-rose-500"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>;
        const IconWifiOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/></svg>;

        const EMOJIS = ['😎','🥰','🤓','👽','👻','🐱','🐶','🦊','🦖','🦋','🌻','🍕','☕','🎮','✨'];
        
        // NOVO: Lista de humores
        const MOODS = [
            { emoji: '😃', label: 'Feliz' },
            { emoji: '😴', label: 'Cansado' },
            { emoji: '🤯', label: 'Estressado' },
            { emoji: '🥰', label: 'Amoroso' },
            { emoji: '🤧', label: 'Doente' },
            { emoji: '🥳', label: 'Animado' },
            { emoji: '😡', label: 'Irritado' }
        ];

        const getLocalDateString = (date) => {
            const d = new Date(date);
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };

        const getDaysList = () => {
            const days = [];
            const today = new Date();
            for (let i = -30; i <= 365; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() + i);
                days.push({
                    dateObj: d,
                    dateStr: getLocalDateString(d),
                    dayName: d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', ''),
                    dayNum: d.getDate(),
                    monthName: d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '')
                });
            }
            return days;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isOffline, setIsOffline] = useState(!navigator.onLine);
            
            // Dados e Usuários
            const [profile, setProfile] = useState({ name: '', emoji: '🥰' });
            const [allUsers, setAllUsers] = useState([]);
            const [isNameModalOpen, setIsNameModalOpen] = useState(false);
            const [isManageUsersModalOpen, setIsManageUsersModalOpen] = useState(false);
            
            const [events, setEvents] = useState([]);
            const [messages, setMessages] = useState([]);
            
            // Interface
            const [selectedDate, setSelectedDate] = useState(getLocalDateString(new Date()));
            const daysList = useMemo(() => getDaysList(), []);
            const todayRef = useRef(null);
            
            // Modais
            const [isEventModalOpen, setIsEventModalOpen] = useState(false);
            const [newEvent, setNewEvent] = useState({ title: '', time: '', type: 'solo' });
            const [newMessage, setNewMessage] = useState('');
            
            // Edição de Recados
            const [editingMsgId, setEditingMsgId] = useState(null);
            const [editMsgText, setEditMsgText] = useState('');

            // Edição de Usuários (Gerenciador)
            const [editingUserId, setEditingUserId] = useState(null);
            const [editUserForm, setEditUserForm] = useState({ name: '', emoji: '' });

            useEffect(() => {
                // Recupera perfil salvo no celular
                const savedProfile = localStorage.getItem('nossoplanner_profile');
                if (savedProfile) {
                    setProfile(JSON.parse(savedProfile));
                } else {
                    setIsNameModalOpen(true);
                }

                const handleOnline = () => setIsOffline(false);
                const handleOffline = () => setIsOffline(true);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                // Autenticação Silenciosa
                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });
                signInAnonymously(auth).catch(console.error);

                setTimeout(() => {
                    if (todayRef.current) todayRef.current.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }, 100);

                return () => {
                    unsubscribeAuth();
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                if (!user) return; 

                // Salva o perfil do usuário atual no banco assim que ele loga
                if (profile.name) {
                    setDoc(doc(db, 'planner_users', user.uid), {
                        id: user.uid,
                        name: profile.name,
                        emoji: profile.emoji,
                        lastActive: Date.now()
                    }, { merge: true });
                }

                // Carrega todos os usuários
                const unsubUsers = onSnapshot(collection(db, 'planner_users'), (snapshot) => {
                    const loadedUsers = [];
                    snapshot.forEach(doc => {
                        // CORREÇÃO DE BUG: Força pegar o ID real do documento para a lixeira funcionar sempre
                        loadedUsers.push({ ...doc.data(), id: doc.id });
                    });
                    setAllUsers(loadedUsers);
                });

                // Carrega Eventos
                const unsubEvents = onSnapshot(collection(db, 'planner_events'), (snapshot) => {
                    const loadedEvents = [];
                    snapshot.forEach(doc => loadedEvents.push({ id: doc.id, ...doc.data() }));
                    setEvents(loadedEvents);
                });

                // Carrega Mensagens
                const unsubMessages = onSnapshot(collection(db, 'planner_messages'), (snapshot) => {
                    const loadedMessages = [];
                    const now = Date.now();
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.expiresAt > now) {
                            loadedMessages.push({ id: doc.id, ...data });
                        } else {
                            deleteDoc(doc.ref).catch(()=>{}); // Limpa mensagens velhas
                        }
                    });
                    loadedMessages.sort((a, b) => b.timestamp - a.timestamp);
                    setMessages(loadedMessages);
                });

                return () => { unsubUsers(); unsubEvents(); unsubMessages(); };
            }, [user, profile.name]);

            const handleSaveProfile = async (e) => {
                e.preventDefault();
                if (profile.name.trim()) {
                    localStorage.setItem('nossoplanner_profile', JSON.stringify(profile));
                    setIsNameModalOpen(false);
                    // Atualiza o banco na hora
                    if (user) {
                        await setDoc(doc(db, 'planner_users', user.uid), {
                            id: user.uid,
                            name: profile.name,
                            emoji: profile.emoji,
                            lastActive: Date.now()
                        }, { merge: true });
                    }
                }
            };

            const handleDeleteUser = async (userId) => {
                if(window.confirm("Remover este perfil do sistema?")) {
                    await deleteDoc(doc(db, 'planner_users', userId));
                    // NOVO: Se o usuário apagar a si mesmo no gerenciador, limpa a tela e pede login de novo
                    if (user && userId === user.uid) {
                        localStorage.removeItem('nossoplanner_profile');
                        setProfile({ name: '', emoji: '🥰' });
                        setIsNameModalOpen(true);
                    }
                }
            };

            // NOVO: Função para salvar o humor no banco de dados
            const handleUpdateMood = async (moodEmoji) => {
                if (user && profile.name) {
                    await setDoc(doc(db, 'planner_users', user.uid), { 
                        mood: moodEmoji,
                        moodDate: getLocalDateString(new Date()) // Salva a data para sabermos se o humor é "de hoje"
                    }, { merge: true });
                }
            };

            const handleAddEvent = async (e) => {
                e.preventDefault();
                if (!newEvent.title.trim() || !user) return;

                await addDoc(collection(db, 'planner_events'), {
                    title: newEvent.title,
                    time: newEvent.time,
                    date: selectedDate,
                    type: newEvent.type,
                    author: profile.name,
                    authorId: user.uid,
                    timestamp: Date.now()
                });
                
                setNewEvent({ title: '', time: '', type: 'solo' });
                setIsEventModalOpen(false);
            };

            const handleDeleteEvent = async (id) => await deleteDoc(doc(db, 'planner_events', id));

            const handleJoinEvent = async (event) => {
                const authors = event.author.split(' & ');
                if (!authors.includes(profile.name)) authors.push(profile.name);
                await updateDoc(doc(db, 'planner_events', event.id), { type: 'conjunto', author: authors.join(' & ') });
            };

            const handleLeaveEvent = async (event) => {
                const authors = event.author.split(' & ');
                const remaining = authors.filter(name => name !== profile.name);
                if (remaining.length === 0) {
                    await deleteDoc(doc(db, 'planner_events', event.id));
                } else {
                    await updateDoc(doc(db, 'planner_events', event.id), { type: remaining.length > 1 ? 'conjunto' : 'solo', author: remaining.join(' & ') });
                }
            };

            const handleAddMessage = async (e) => {
                e.preventDefault();
                if (!newMessage.trim() || !user) return;
                const ONE_WEEK_MS = 7 * 24 * 60 * 60 * 1000;
                await addDoc(collection(db, 'planner_messages'), {
                    text: newMessage,
                    author: profile.name,
                    authorId: user.uid,
                    timestamp: Date.now(),
                    expiresAt: Date.now() + ONE_WEEK_MS
                });
                setNewMessage('');
            };

            const handleStartEditMessage = (msg) => {
                setEditingMsgId(msg.id);
                setEditMsgText(msg.text);
            };

            const handleSaveEditMessage = async (id) => {
                if (editMsgText.trim()) {
                    await updateDoc(doc(db, 'planner_messages', id), { text: editMsgText });
                }
                setEditingMsgId(null);
            };

            const handleDeleteMessage = async (id) => {
                if(window.confirm("Apagar recadinho?")) {
                    await deleteDoc(doc(db, 'planner_messages', id));
                }
            };

            const handleGoToToday = () => {
                const todayStr = getLocalDateString(new Date());
                setSelectedDate(todayStr);
                if (todayRef.current) {
                    todayRef.current.scrollIntoView({ behavior: 'smooth', inline: 'center' });
                }
            };

            const handleStartEditUser = (u) => {
                setEditingUserId(u.id);
                setEditUserForm({ name: u.name, emoji: u.emoji });
            };

            const handleSaveEditUser = async (id) => {
                if (editUserForm.name.trim()) {
                    await updateDoc(doc(db, 'planner_users', id), { 
                        name: editUserForm.name, 
                        emoji: editUserForm.emoji 
                    });
                    setEditingUserId(null);
                    // Se você editou seu próprio perfil, atualiza na mesma hora
                    if (user && id === user.uid) {
                        const newProfile = { name: editUserForm.name, emoji: editUserForm.emoji };
                        setProfile(newProfile);
                        localStorage.setItem('nossoplanner_profile', JSON.stringify(newProfile));
                    }
                }
            };

            // Processamento do Dia
            const dailyEvents = events.filter(e => e.date === selectedDate).sort((a, b) => {
                if (a.time && b.time) return a.time.localeCompare(b.time);
                if (a.time && !b.time) return -1;
                if (!a.time && b.time) return 1;
                return a.timestamp - b.timestamp;
            });
            const soloEvents = dailyEvents.filter(e => e.type === 'solo');
            const jointEvents = dailyEvents.filter(e => e.type === 'conjunto');

            return (
                <div className="min-h-screen pb-20 md:pb-8 flex flex-col">
                    {/* HEADER MODERNO */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-teal-100">
                        <div className="w-full max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row md:items-center justify-between gap-3">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <img src="img/Logo_Planner.png" alt="Logo" className="w-10 h-10 object-contain rounded-xl drop-shadow-sm" onerror="this.style.display='none'" />
                                    <h1 className="text-xl md:text-2xl font-bold text-teal-800">Nosso Planner</h1>
                                </div>
                                {isOffline && (
                                    <div className="md:hidden flex items-center gap-1 text-[10px] font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded-full border border-rose-100">
                                        <IconWifiOff />
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex items-center justify-between md:justify-end gap-3">
                                {/* AVATARES COM NOMES */}
                                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar max-w-full">
                                    {allUsers.map(u => (
                                        <div key={u.id} onClick={() => setIsNameModalOpen(true)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border shadow-sm cursor-pointer whitespace-nowrap transition hover:scale-105 ${u.id === user?.uid ? 'border-teal-400 bg-teal-50' : 'border-slate-200 bg-white'}`} title={u.name}>
                                            <span className="text-base">{u.emoji}</span>
                                            <span className="text-xs font-bold text-slate-700">{u.name.split(' ')[0]}</span>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setIsManageUsersModalOpen(true)} className="text-[10px] md:text-xs font-bold text-teal-600 bg-teal-50 border border-teal-200 hover:bg-teal-100 px-3 py-1.5 rounded-full transition whitespace-nowrap">
                                    Gerenciar
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="w-full max-w-6xl mx-auto px-2 md:px-4 mt-4 grid grid-cols-1 lg:grid-cols-3 gap-4 flex-1">
                        
                        <div className="lg:col-span-2 flex flex-col gap-4">
                            
                            {/* NOVO: HUMOR DO DIA */}
                            <div className="bg-white rounded-2xl shadow-sm p-3 md:p-4 border border-teal-100">
                                <h2 className="text-xs font-bold text-teal-600 uppercase tracking-widest mb-3 px-1">Como você está hoje?</h2>
                                <div className="flex flex-col md:flex-row gap-3 md:items-center">
                                    {/* Escolher o Seu Humor */}
                                    <div className="flex bg-slate-50 p-1.5 rounded-xl gap-1 overflow-x-auto no-scrollbar shrink-0 border border-slate-100 shadow-inner">
                                        {MOODS.map(m => {
                                            const myUser = allUsers.find(u => u.id === user?.uid);
                                            // Verifica se o seu humor de hoje é o deste botão
                                            const isSelected = myUser?.mood === m.emoji && myUser?.moodDate === getLocalDateString(new Date());
                                            return (
                                                <button key={m.emoji} onClick={() => handleUpdateMood(m.emoji)} className={`text-xl md:text-2xl p-2 rounded-lg transition-all ${isSelected ? 'bg-teal-200 scale-110 shadow-sm' : 'hover:bg-teal-100 grayscale-[0.5] hover:grayscale-0'}`} title={m.label}>
                                                    {m.emoji}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    
                                    {/* Mostrar o Humor de Todos os Participantes */}
                                    <div className="flex flex-1 gap-2 overflow-x-auto no-scrollbar py-1 px-1">
                                        {allUsers.map(u => {
                                            // Só mostra o balãozinho de humor se ele tiver clicado hoje!
                                            const isToday = u.moodDate === getLocalDateString(new Date());
                                            if (!u.mood || !isToday) return null;
                                            
                                            return (
                                                <div key={`mood-${u.id}`} className="flex items-center gap-1.5 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-sm shrink-0 animate-fade-in">
                                                    <span className="text-lg">{u.emoji}</span>
                                                    <span className="text-xs font-bold text-slate-700">{u.name.split(' ')[0]}</span>
                                                    <span className="text-lg ml-1 drop-shadow-sm">{u.mood}</span>
                                                </div>
                                            );
                                        })}
                                        {/* Mensagem caso ninguém tenha colocado o humor ainda */}
                                        {allUsers.filter(u => u.mood && u.moodDate === getLocalDateString(new Date())).length === 0 && (
                                            <p className="text-xs text-slate-400 italic ml-2 mt-2">Ninguém atualizou o humor hoje ainda.</p>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* CALENDÁRIO COM DICAS (SPOILERS) E BOTÃO HOJE */}
                            <div className="bg-white rounded-2xl shadow-sm p-3 border border-teal-100">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <h2 className="text-xs font-bold text-teal-600 uppercase tracking-widest">Calendário</h2>
                                    <button onClick={handleGoToToday} className="text-[10px] font-bold text-teal-700 bg-teal-50 hover:bg-teal-100 border border-teal-200 px-3 py-1 rounded-full transition active:scale-95 shadow-sm">
                                        Voltar para Hoje
                                    </button>
                                </div>
                                <div className="flex overflow-x-auto no-scrollbar gap-2 pb-2 snap-x items-start">
                                    {daysList.map((day) => {
                                        const isSelected = day.dateStr === selectedDate;
                                        const isToday = day.dateStr === getLocalDateString(new Date());
                                        const dayEvents = events.filter(e => e.date === day.dateStr);

                                        return (
                                            <button key={day.dateStr} ref={isToday ? todayRef : null} onClick={() => setSelectedDate(day.dateStr)}
                                                className={`snap-center flex flex-col items-center min-w-[4.8rem] min-h-[5.5rem] p-2 rounded-xl transition-all relative ${isSelected ? 'bg-teal-500 text-white shadow-md scale-105 font-bold' : 'bg-white text-teal-800 hover:bg-teal-50 border border-teal-100'}`}>
                                                <span className="text-[10px] uppercase tracking-wider font-semibold opacity-80">{day.monthName}</span>
                                                <span className="text-xl font-bold my-0.5">{day.dayNum}</span>
                                                <span className="text-[10px] uppercase tracking-wider opacity-80 mb-1">{isToday ? 'Hoje' : day.dayName}</span>
                                                
                                                {/* Miniaturas de Eventos no Calendário */}
                                                <div className="w-full flex flex-col gap-[2px] mt-auto">
                                                    {dayEvents.slice(0, 2).map((e, idx) => (
                                                        <div key={idx} className={`text-[8px] px-1 rounded-sm w-full truncate text-left ${isSelected ? 'bg-white/20 text-white' : (e.type === 'conjunto' ? 'bg-amber-100 text-amber-700' : 'bg-sky-100 text-sky-700')}`}>
                                                            {e.time && <span>{e.time} </span>}{e.title}
                                                        </div>
                                                    ))}
                                                    {dayEvents.length > 2 && <div className={`text-[8px] font-bold text-center ${isSelected ? 'text-white' : 'text-teal-400'}`}>+{dayEvents.length - 2}</div>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* COMPROMISSOS */}
                            <div className="bg-white rounded-2xl shadow-sm p-4 md:p-6 flex-1 flex flex-col border border-teal-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2">Compromissos</h2>
                                    <button onClick={() => setIsEventModalOpen(true)} className="bg-teal-500 hover:bg-teal-600 text-white p-2 md:px-4 md:py-2 rounded-full font-bold flex items-center gap-1 transition shadow-sm active:scale-95"><IconPlus /> <span className="hidden md:inline">Adicionar</span></button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {/* NOSSO TEMPO (AMBER/ORANGE) */}
                                    <div className="bg-amber-50/50 border border-amber-100 p-3 rounded-2xl">
                                        <h3 className="text-sm font-bold text-amber-600 mb-3 flex items-center gap-1 uppercase tracking-wide"><IconUsers /> Nosso Tempo</h3>
                                        <div className="space-y-2">
                                            {jointEvents.length === 0 && <p className="text-xs text-amber-400 italic">Nada marcado juntos ainda.</p>}
                                            {jointEvents.map(event => (
                                                <div key={event.id} className="animate-fade-in bg-white border border-amber-100 p-3 rounded-xl flex justify-between items-center shadow-sm">
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-slate-800 text-sm">{event.time && <span className="mr-2 text-amber-700 bg-amber-100 px-1 py-0.5 rounded text-[10px] font-bold">{event.time}</span>}{event.title}</p>
                                                        <p className="text-[10px] text-amber-500 mt-0.5">Com {event.author}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1 ml-2">
                                                        <button onClick={() => handleLeaveEvent(event)} className="text-[10px] font-bold text-amber-600 bg-amber-100 hover:bg-amber-200 px-2 py-1 rounded-lg transition active:scale-95">Sair 👋</button>
                                                        <button onClick={() => handleDeleteEvent(event.id)} className="text-amber-300 hover:text-amber-600 p-1"><IconTrash /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {/* SOLO (SKY/AZUL) */}
                                    <div className="bg-sky-50/50 border border-sky-100 p-3 rounded-2xl">
                                        <h3 className="text-sm font-bold text-sky-600 mb-3 flex items-center gap-1 uppercase tracking-wide"><IconUser /> Solo</h3>
                                        <div className="space-y-2">
                                            {soloEvents.length === 0 && <p className="text-xs text-sky-400 italic">Nada por aqui.</p>}
                                            {soloEvents.map(event => (
                                                <div key={event.id} className="animate-fade-in bg-white border border-sky-100 p-3 rounded-xl flex justify-between items-center shadow-sm">
                                                    <div className="flex-1">
                                                        <p className="font-semibold text-slate-800 text-sm">{event.time && <span className="mr-2 text-sky-700 bg-sky-100 px-1 py-0.5 rounded text-[10px] font-bold">{event.time}</span>}{event.title}</p>
                                                        <p className="text-[10px] text-sky-500 mt-0.5">De {event.author}</p>
                                                    </div>
                                                    <div className="flex items-center gap-1 ml-2">
                                                        {!event.author.includes(profile.name) && (
                                                            <button onClick={() => handleJoinEvent(event)} className="text-[10px] font-bold text-sky-600 bg-sky-100 hover:bg-sky-200 px-2 py-1 rounded-lg transition active:scale-95">Participar 🙋</button>
                                                        )}
                                                        <button onClick={() => handleDeleteEvent(event.id)} className="text-sky-300 hover:text-sky-600 p-1"><IconTrash /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* MURAL DE CARINHO (ROSE) */}
                        <div className="lg:col-span-1 h-[400px] lg:h-auto">
                            <div className="bg-rose-50 rounded-2xl shadow-sm p-4 border border-rose-100 h-full flex flex-col">
                                <h2 className="text-lg md:text-xl font-bold text-rose-800 flex items-center gap-2 mb-2"><IconHeart /> Mural de Carinho</h2>
                                <p className="text-[10px] text-rose-500 mb-3 font-medium">Recados duram 1 semana!</p>
                                
                                <div className="flex-1 overflow-y-auto space-y-3 no-scrollbar mb-4">
                                    {messages.length === 0 && <p className="text-xs text-center text-rose-400 mt-10">Deixe um pouco de amor aqui...</p>}
                                    {messages.map(msg => {
                                        // A Mágica do Edit/Delete: Se for o mesmo UID ou o mesmo Nome (caso limpe o cache do celular)
                                        const isMyMessage = user && (msg.authorId === user.uid || msg.author === profile.name);
                                        
                                        return (
                                            <div key={msg.id} className="animate-fade-in bg-white p-3 rounded-xl shadow-sm border border-rose-100">
                                                {editingMsgId === msg.id ? (
                                                    <div className="flex flex-col gap-2">
                                                        <textarea value={editMsgText} onChange={e=>setEditMsgText(e.target.value)} className="w-full text-sm p-2 border border-rose-200 rounded focus:outline-none focus:border-rose-400 bg-rose-50/50" rows="2" autoFocus />
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={()=>setEditingMsgId(null)} className="text-[10px] text-slate-500 font-bold px-2 py-1">Cancelar</button>
                                                            <button onClick={()=>handleSaveEditMessage(msg.id)} className="text-[10px] bg-rose-500 text-white font-bold px-3 py-1 rounded-lg">Salvar</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <p className="text-slate-700 text-sm leading-relaxed">{msg.text}</p>
                                                        <div className="mt-2 flex justify-between items-center">
                                                            <div className="flex gap-2 min-w-[40px]">
                                                                {isMyMessage && (
                                                                    <>
                                                                        <button onClick={()=>handleStartEditMessage(msg)} className="text-rose-300 hover:text-rose-600 p-1"><IconEdit /></button>
                                                                        <button onClick={()=>handleDeleteMessage(msg.id)} className="text-rose-300 hover:text-red-500 p-1"><IconTrash /></button>
                                                                    </>
                                                                )}
                                                            </div>
                                                            <div className="text-[10px] text-rose-600 font-bold bg-rose-50 px-2 py-0.5 rounded-full border border-rose-100">{msg.author}</div>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <form onSubmit={handleAddMessage} className="mt-auto pt-2 relative flex items-center">
                                    <input type="text" value={newMessage} onChange={(e) => setNewMessage(e.target.value)} placeholder="Deixe um recadinho..." className="w-full bg-white border-2 border-rose-200 rounded-full py-3 px-4 pr-12 focus:outline-none focus:border-rose-400 text-sm shadow-sm" maxLength={150} />
                                    <button type="submit" disabled={!newMessage.trim()} className="absolute right-1.5 bg-rose-500 hover:bg-rose-600 disabled:bg-rose-200 text-white rounded-full w-9 h-9 flex items-center justify-center transition active:scale-95"><IconHeart /></button>
                                </form>
                            </div>
                        </div>
                    </main>

                    {/* MODAL GERENCIAR USUÁRIOS */}
                    {isManageUsersModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in border-4 border-teal-100">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-teal-800">Pessoas no Planner</h2>
                                    <button onClick={() => setIsManageUsersModalOpen(false)} className="text-slate-400 hover:text-slate-700 text-2xl">&times;</button>
                                </div>
                                <div className="space-y-3 mb-4 max-h-[60vh] overflow-y-auto no-scrollbar">
                                    {allUsers.map(u => (
                                        <div key={u.id} className="flex flex-col bg-slate-50 border border-slate-100 p-3 rounded-xl gap-2">
                                            {editingUserId === u.id ? (
                                                <div className="flex flex-col gap-3 animate-fade-in">
                                                    <div className="grid grid-cols-5 gap-1 bg-white p-2 rounded-xl border border-slate-200">
                                                        {EMOJIS.map(em => (
                                                            <button key={em} onClick={() => setEditUserForm({...editUserForm, emoji: em})} className={`text-lg p-1 rounded-lg transition ${editUserForm.emoji === em ? 'bg-teal-200 scale-110 shadow-sm' : 'hover:bg-slate-100'}`}>
                                                                {em}
                                                            </button>
                                                        ))}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <input value={editUserForm.name} onChange={e => setEditUserForm({...editUserForm, name: e.target.value})} className="flex-1 text-sm p-2 border-2 border-slate-200 rounded-lg focus:outline-none focus:border-teal-400 font-bold text-slate-700" />
                                                    </div>
                                                    <div className="flex justify-end gap-2 mt-1">
                                                        <button onClick={() => setEditingUserId(null)} className="text-[10px] text-slate-500 font-bold px-3 py-1.5 hover:bg-slate-200 rounded-lg transition">Cancelar</button>
                                                        <button onClick={() => handleSaveEditUser(u.id)} className="text-[10px] bg-teal-500 text-white font-bold px-4 py-1.5 rounded-lg shadow-sm hover:bg-teal-600 transition">Salvar</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-2xl">{u.emoji}</span>
                                                        <span className="font-bold text-slate-700">{u.name}</span>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => handleStartEditUser(u)} className="text-teal-500 hover:text-teal-700 p-2 bg-teal-50 hover:bg-teal-100 rounded-full transition" title="Editar usuário">
                                                            <IconEdit />
                                                        </button>
                                                        <button onClick={() => handleDeleteUser(u.id)} className="text-rose-400 hover:text-rose-600 p-2 bg-rose-50 hover:bg-rose-100 rounded-full transition" title="Remover usuário">
                                                            <IconTrash />
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {allUsers.length === 0 && <p className="text-sm text-center text-slate-500">Ninguém encontrado.</p>}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL PERFIL E EMOJI */}
                    {isNameModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in border-4 border-teal-100">
                                <h2 className="text-2xl font-bold text-teal-800 mb-1 text-center">Seu Perfil ✨</h2>
                                <p className="text-xs text-slate-500 mb-4 text-center">Como você quer ser visto no planner?</p>
                                
                                <form onSubmit={handleSaveProfile} className="flex flex-col gap-4">
                                    {/* Escolha do Emoji */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">1. Escolha seu Emoji</label>
                                        <div className="grid grid-cols-5 gap-2 bg-slate-50 p-3 rounded-2xl">
                                            {EMOJIS.map(em => (
                                                <button key={em} type="button" onClick={() => setProfile({...profile, emoji: em})} className={`text-2xl p-1 rounded-xl transition ${profile.emoji === em ? 'bg-teal-200 scale-110 shadow-sm' : 'hover:bg-teal-100'}`}>
                                                    {em}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Escolha do Nome */}
                                    <div>
                                        <label className="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">2. Seu Nome ou Apelido</label>
                                        <div className="relative">
                                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-2xl">{profile.emoji}</div>
                                            <input value={profile.name} onChange={(e)=>setProfile({...profile, name: e.target.value})} type="text" placeholder="Nome" className="w-full border-2 border-slate-200 rounded-xl p-3 pl-12 focus:outline-none focus:border-teal-500 font-bold text-slate-700" required />
                                        </div>
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-teal-500 text-white hover:bg-teal-600 font-bold py-3.5 rounded-xl transition active:scale-95 mt-2 shadow-md">Salvar Perfil</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL NOVO COMPROMISSO */}
                    {isEventModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end md:items-center justify-center p-0 md:p-4 z-50">
                            <div className="bg-white rounded-t-3xl md:rounded-3xl p-6 w-full max-w-md shadow-2xl animate-[slideUp_0.3s_ease-out] md:animate-fade-in border-t-4 border-teal-500 md:border-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-bold text-teal-800">Novo Compromisso</h2>
                                    <button type="button" onClick={() => setIsEventModalOpen(false)} className="bg-slate-100 text-slate-500 hover:text-slate-800 w-8 h-8 rounded-full flex items-center justify-center font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleAddEvent}>
                                    <input type="text" value={newEvent.title} onChange={(e) => setNewEvent({...newEvent, title: e.target.value})} placeholder="O que vai acontecer?" className="w-full border-2 border-slate-200 rounded-xl p-3 mb-4 focus:outline-none focus:border-teal-500 font-medium" required autoFocus />
                                    
                                    <div className="mb-4">
                                        <label className="block text-xs font-bold text-slate-500 mb-1 ml-1">Horário (Opcional)</label>
                                        <input type="time" value={newEvent.time} onChange={(e) => setNewEvent({...newEvent, time: e.target.value})} className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-teal-500 font-medium text-slate-600" />
                                    </div>

                                    <div className="flex gap-3 mb-6">
                                        <button type="button" onClick={() => setNewEvent({...newEvent, type: 'solo'})} className={`flex-1 py-3 rounded-xl border-2 font-bold transition flex flex-col items-center justify-center gap-1 ${newEvent.type === 'solo' ? 'border-sky-400 bg-sky-50 text-sky-700 shadow-sm' : 'border-slate-100 text-slate-400 bg-slate-50'}`}><IconUser /> Só Meu</button>
                                        <button type="button" onClick={() => setNewEvent({...newEvent, type: 'conjunto'})} className={`flex-1 py-3 rounded-xl border-2 font-bold transition flex flex-col items-center justify-center gap-1 ${newEvent.type === 'conjunto' ? 'border-amber-400 bg-amber-50 text-amber-700 shadow-sm' : 'border-slate-100 text-slate-400 bg-slate-50'}`}><IconUsers /> Nosso</button>
                                    </div>
                                    <button type="submit" disabled={!newEvent.title.trim()} className="w-full bg-teal-500 disabled:bg-teal-300 hover:bg-teal-600 text-white font-bold py-4 rounded-xl transition active:scale-95 shadow-md">Salvar Compromisso</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW falhou: ', err));
            });
        }
    </script>
</body>
</html>
